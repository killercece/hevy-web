{% extends "base.html" %}
{% set hide_nav = true %}
{% block title %}Inscription — Hevy{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-wrap__logo">
    <div class="auth-wrap__logo-mark">
      <i data-lucide="dumbbell"></i>
    </div>
    <div class="auth-wrap__brand">Hevy<span>.</span></div>
    <div class="auth-wrap__subtitle">Rejoignez la communauté.</div>
  </div>

  <form class="auth-form" method="post" action="{{ url_for('auth.register_submit') }}">
    <div class="input-group">
      <label class="input-group__label" for="email">Email</label>
      <input class="input" type="email" name="email" id="email" required autocomplete="email" placeholder="vous@exemple.com">
    </div>

    <div class="input-group">
      <label class="input-group__label" for="password">Mot de passe</label>
      <input class="input" type="password" name="password" id="password" required autocomplete="new-password" minlength="6" placeholder="Min. 6 caractères">
      <span class="input-group__hint">6 caractères minimum.</span>
    </div>

    <div class="input-group">
      <label class="input-group__label" for="unit">Unité préférée</label>
      <select class="input" name="unit_system" id="unit">
        <option value="metric">Kilogrammes (kg)</option>
        <option value="imperial">Livres (lbs)</option>
      </select>
    </div>

    <button type="submit" class="btn btn--primary btn--lg btn--block">
      <span>Créer mon compte</span>
      <i data-lucide="arrow-right"></i>
    </button>

    <div class="auth-form__switch">
      Déjà un compte ?
      <a href="{{ url_for('auth.login_page') }}">Se connecter</a>
    </div>
  </form>
</div>
{% endblock %}
